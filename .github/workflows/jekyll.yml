name: Jekyll site CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Xterm.js siteye yükle
      run: |
       sudo apt-get update
       sudo apt-get install --install-recommends nodejs npm git -y
       npm install xterm
       mv node_modules/ xterm_files/
       cp xterm_files/xterm/* xterm/
    - name: Xterm.js dosyalarını siteye aktar
      uses: matheusalbino/git-commit@v1.0.1
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build the site in the jekyll/builder container
      run: |
        docker run \
        -v ${{ github.workspace }}:/srv/jekyll -v ${{ github.workspace }}/_site:/srv/jekyll/_site \
        jekyll/builder:latest /bin/bash -c "chmod -R 777 /srv/jekyll && jekyll build --future"
